# KoAI-Verify 릴리즈 + PyPI 배포 워크플로우
#
# 트리거: v* 태그 푸시 (예: v0.1.0, v1.2.3)
# 수행:   1) 전체 테스트 통과 확인
#         2) GitHub Release 자동 생성
#         3) PyPI 업로드 (PYPI_TOKEN secret 필요)
#
# PyPI 사전 준비:
#   1. https://pypi.org 계정 생성
#   2. API 토큰 발급 (Settings → API tokens)
#   3. GitHub 저장소 Settings → Secrets → PYPI_TOKEN 으로 등록

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    name: 테스트 통과 확인
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction

      - name: Lint — ruff
        run: poetry run ruff check .

      - name: Format — black
        run: poetry run black --check .

      - name: Test — pytest
        run: poetry run pytest tests/unit/ -v --tb=short

  release:
    name: GitHub Release + PyPI 배포
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install poetry build twine

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build distribution packages
        run: poetry build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KoAI-Verify v${{ steps.version.outputs.VERSION }}"
          body: |
            ## KoAI-Verify v${{ steps.version.outputs.VERSION }}

            한국 AI 기본법 제31조 표시 의무 검증 오픈소스 SDK

            ### 설치
            ```bash
            pip install koai-verify==${{ steps.version.outputs.VERSION }}
            ```

            ### 변경 사항
            [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 참조

            ### 강건성 벤치마크
            [benchmarks/results/survival_summary_v1.md](https://github.com/${{ github.repository }}/blob/main/benchmarks/results/survival_summary_v1.md)
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::warning::PYPI_TOKEN secret 미설정 — PyPI 업로드 건너뜀"
            echo "설정 방법: GitHub Settings → Secrets → PYPI_TOKEN"
            exit 0
          fi
          twine upload dist/*
