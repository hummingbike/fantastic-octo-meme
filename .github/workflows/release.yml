# KoAI-Verify 릴리즈 + PyPI 배포 워크플로우
#
# 트리거: v* 태그 푸시 (예: v0.1.0, v1.2.3)
# 수행:   1) 전체 테스트 통과 확인
#         2) GitHub Release 자동 생성
#         3) PyPI 업로드 (PYPI_TOKEN secret 필요)
#
# PyPI 사전 준비:
#   1. https://pypi.org 계정 생성
#   2. API 토큰 발급 (Settings → API tokens)
#   3. GitHub 저장소 Settings → Secrets → PYPI_TOKEN 으로 등록

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "테스트 건너뛰기 (PyPI 재배포 시)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  test:
    name: 테스트 통과 확인
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install --no-interaction

      - name: Lint — ruff
        run: poetry run ruff check .

      - name: Format — black
        run: poetry run black --check .

      - name: Test — pytest
        run: poetry run pytest tests/unit/ -v --tb=short

  release:
    name: GitHub Release + PyPI 배포
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install poetry build twine

      - name: Extract version from tag
        id: version
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "IS_TAG=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=manual" >> $GITHUB_OUTPUT
            echo "IS_TAG=false" >> $GITHUB_OUTPUT
          fi

      - name: Build distribution packages
        run: poetry build

      - name: Create GitHub Release
        if: steps.version.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "KoAI-Verify v${{ steps.version.outputs.VERSION }}"
          body: |
            ## KoAI-Verify v${{ steps.version.outputs.VERSION }}

            한국 AI 기본법 제31조 표시 의무 검증 오픈소스 SDK

            ### 설치
            ```bash
            pip install koai-verify==${{ steps.version.outputs.VERSION }}
            ```

            ### 변경 사항
            [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) 참조

            ### 강건성 벤치마크
            [benchmarks/results/survival_summary_v1.md](https://github.com/${{ github.repository }}/blob/main/benchmarks/results/survival_summary_v1.md)
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::PYPI_TOKEN secret 이 비어 있습니다."
            echo "확인: GitHub → hummingbike/fantastic-octo-meme → Settings"
            echo "      → Secrets and variables → Actions → Repository secrets"
            echo "      이름이 정확히 'PYPI_TOKEN' (모두 대문자) 인지 확인하세요."
            exit 1
          fi
          echo "✓ PYPI_TOKEN 감지됨 — PyPI 업로드 시작"
          twine upload dist/*
